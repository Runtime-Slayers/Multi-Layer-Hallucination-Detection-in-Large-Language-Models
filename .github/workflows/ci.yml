name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    name: "Test · Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check hallucination_detector/ experiments/ tests/ \
            --output-format=github \
            --select E,W,F,I,N,UP

      - name: Run pytest
        run: |
          pytest tests/ \
            --strict-markers \
            --strict-config \
            -p no:warnings \
            -v \
            --tb=short \
            --cov=hallucination_detector \
            --cov-report=html:htmlcov \
            --cov-fail-under=75
        env:
          MPLBACKEND: Agg

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 14

  doctest:
    name: "Doctest · Packages"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run doctests
        run: |
          pytest --doctest-modules hallucination_detector/ \
            -v \
            --tb=short \
            -p no:warnings
        env:
          MPLBACKEND: Agg

  smoke:
    name: "Smoke test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Hallucination Experiment
        run: |
          python experiments/p9_hallucination_validation.py --no-plots --results-file /tmp/smoke_out/p9_results.json
        env:
          MPLBACKEND: Agg

      - name: Validate JSON Output
        run: |
          python - <<'PYEOF'
          import json, sys
          from pathlib import Path
          
          p = Path("/tmp/smoke_out/p9_results.json")
          assert p.exists()
          data = json.loads(p.read_text())
          assert "corpus" in data
          assert "final_model" in data
          assert "cv_results" in data
          assert "layer_aucs" in data
          
          print("P9 validation passed ✓")
          PYEOF

  security:
    name: "Security audit · pip-audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit
      - name: Run pip-audit
        run: |
          pip-audit --format=json --output=audit.json || true
          python - <<'PYEOF'
          import json
          from pathlib import Path
          raw = Path("audit.json").read_text()
          report = json.loads(raw)
          vulns = [v for pkg in report for v in pkg.get("vulns", [])]
          if vulns:
              print(f"Warnings: {len(vulns)} advisories found.")
          else:
              print("No CVEs found ✓")
          PYEOF

  docs:
    name: "Integrity check"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - name: Verify files
        run: |
          for f in README.md LICENSE CONTRIBUTING.md CHANGELOG.md docs/THEORY.md; do
            if [ ! -s "$f" ]; then
              echo "$f is missing or empty" && exit 1
            fi
          done
          echo "All documentation files validated ✓"

      - name: Verify Version Consistency
        run: |
          pyproject_ver=$(python -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', text)
          print(m.group(1) if m else 'NOTFOUND')
          ")
          init_ver=$(python -c "
          import re, pathlib
          text = pathlib.Path('hallucination_detector/__init__.py').read_text()
          m = re.search(r'__version__\s*=\s*[\"\\']([^\"\\']+)', text)
          print(m.group(1) if m else 'NOTFOUND')
          ")
          if [ "$pyproject_ver" != "$init_ver" ]; then
            echo "Version mismatch: pyproject ($pyproject_ver) vs package ($init_ver)" && exit 1
          fi
          echo "Versions are consistent ✓"
